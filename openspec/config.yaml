schema: spec-driven

context: |
  ## Proyecto: BlendPOS

  Sistema Point-of-Sale offline-first para kioscos y droguerĂ­as argentinas.
  Integra con AFIP/ARCA (autoridad fiscal argentina) para facturaciĂ³n electrĂ³nica.

  ---

  ## Arquitectura de servicios

  ```
  Frontend (React+Vite :5173) â†’ Backend (Go/Gin :8000) â†’ PostgreSQL :5432
                                          â†“
                                    Redis :6379 (cache + job queue)
                                          â†“
                                AFIP Sidecar (Python/FastAPI :8001)
                                          â†“
                                  AFIP/ARCA (SOAP/XML externo)
  ```

  - **Backend** (`/backend`): Go 1.24, Gin, GORM, golang-migrate
  - **Frontend** (`/frontend`): React 19, TypeScript, Vite, Mantine UI, Zustand, Dexie.js (IndexedDB)
  - **AFIP Sidecar** (`/afip-sidecar`): Python/FastAPI envolviendo pyafipws (WSAA + WSFEV1)

  ---

  ## Stack y dependencias clave

  **Backend Go:**
  - Web: `gin-gonic/gin` v1.10
  - ORM: `gorm.io/gorm` v1.25 + `gorm.io/driver/postgres`
  - Migraciones: `golang-migrate` (CLI externo, NO AutoMigrate)
  - Auth: `golang-jwt/jwt` v5 + `golang.org/x/crypto` (bcrypt)
  - Cache/Queue: `redis/go-redis` v9
  - Config: `spf13/viper`
  - Logging: `rs/zerolog` (JSON estructurado en producciĂ³n)
  - Decimal: `shopspring/decimal` (nunca float64 para dinero)
  - PDF: `chromedp` + `go-pdf/fpdf`
  - Tests: `testcontainers-go` (PostgreSQL + Redis reales, sin mocks)

  **Frontend React:**
  - UI: `@mantine/core`, `@mantine/charts`, `@mantine/forms`, `@mantine/notifications`
  - Estado: `zustand` (stores: auth, cart, caja, POS UI)
  - Offline: `dexie` v4 (IndexedDB)
  - Router: `react-router-dom` v7
  - HTTP: Axios via `src/api/client.ts` (centralizado)
  - Icons: `lucide-react`
  - PWA: `vite-plugin-pwa` + Workbox

  **AFIP Sidecar Python:**
  - `fastapi` + `uvicorn`, `pydantic` v2
  - `pyafipws` (WSAA + WSFEv1)
  - `redis` (para cachĂ© de tokens AFIP)

  ---

  ## Capas del backend (orden estricto)

  ```
  cmd/server/main.go      â†’ DI wiring, graceful shutdown (composition root)
  internal/config/        â†’ Viper env config
  internal/infra/         â†’ DB, Redis, AFIP client, circuit breaker, mailer
  internal/model/         â†’ GORM models
  internal/dto/           â†’ Request/response DTOs
  internal/repository/    â†’ Data access (GORM, interface + impl)
  internal/service/       â†’ Business logic
  internal/handler/       â†’ HTTP handlers (Gin)
  internal/middleware/    â†’ Auth, CORS, rate limiting, logging
  internal/router/        â†’ Route registration
  internal/worker/        â†’ Async workers (invoicing, email, PDF)
  migrations/             â†’ SQL migration files numerados
  ```

  Flujo de dependencias: handler â†’ service â†’ repository â†’ model.
  Nunca saltar capas (e.g., handler nunca llama GORM directamente).

  ---

  ## Patrones de diseĂ±o obligatorios

  - **Dependency Injection**: todas las dependencias se crean en `main.go` y se inyectan. Nunca usar globals.
  - **Repository pattern**: repos con interfaces â€” permite testear con testcontainers.
  - **No AutoMigrate**: cualquier cambio de esquema va en un archivo SQL numerado en `migrations/`. El comentario en `database.go` lo deja explĂ­cito.
  - **ACID transactions**: las ventas usan `db.Transaction`. Nunca estado parcial.
  - **Circuit breaker**: todas las llamadas al AFIP Sidecar estĂ¡n protegidas. El sidecar puede caer sin tumbar el backend.
  - **Worker pool**: facturaciĂ³n AFIP, generaciĂ³n de PDF y envĂ­o de email son operaciones asĂ­ncronas via Redis queue. Nunca bloquear el request HTTP.
  - **Decimal para dinero**: usar `shopspring/decimal`, nunca `float64`.

  ---

  ## Middleware stack del backend (orden inamovible)

  MaxBodySize â†’ Gzip â†’ RequestID â†’ Logger â†’ Recovery â†’ CORS â†’
  SecurityHeaders â†’ Timeout(30s) â†’ ErrorHandler â†’ RateLimiter â†’ JWT â†’ Audit

  ---

  ## Rate limiting (Redis-backed, por IP)

  - Global: 1000 req/min
  - Login: 10/min | Refresh: 20/min
  - Price lookup pĂºblico: 60/min

  ---

  ## Frontend: capas y restricciones

  ```
  src/pages/             â†’ PĂ¡ginas (lazy-loaded en App.tsx)
  src/components/        â†’ Componentes reutilizables
  src/store/             â†’ Zustand stores
  src/offline/           â†’ Dexie/IndexedDB (db.ts, catalog.ts, sync.ts)
  src/api/client.ts      â†’ Axios HTTP client (punto de entrada Ăºnico)
  src/services/api/      â†’ Wrappers de endpoints
  ```

  **Reglas de capas frontend:**
  - Dexie/IndexedDB: acceso EXCLUSIVO desde `src/offline/`. NingĂºn componente o store instancia Dexie directamente.
  - HTTP: todas las llamadas via `src/api/client.ts` o `src/services/api/`. No usar `fetch()` nativo salvo FormData multipart con comentario explicativo.
  - Stores Zustand: no contienen lĂ³gica de negocio, solo estado UI y llamadas a services.

  ---

  ## Flujo offline-first

  1. Venta registrada â†’ guardada en IndexedDB (Dexie) con `offline_id` Ăºnico.
  2. Si hay conectividad: sincronizaciĂ³n inmediata vĂ­a `POST /v1/ventas/sync-batch`.
  3. Si no hay conectividad: `sync.ts` encola y reintenta al restaurarse la conexiĂ³n.
  4. `offline_id` garantiza idempotencia â€” el backend no duplica ventas re-enviadas.

  ---

  ## AFIP Sidecar

  Microservicio que encapsula la complejidad de WSAA + WSFEV1.
  El backend (`facturacion_service.go`) lo llama vĂ­a HTTP con circuit breaker.

  Endpoints:
  - `GET /health` â€” incluye verificaciĂ³n de conectividad con AFIP
  - `POST /facturar` â†’ devuelve `{ cae, cae_vencimiento, numero_comprobante }`

  Certificados X.509 en `afip-sidecar/certs/` (gitignoreado, nunca commitear).
  `AFIP_HOMOLOGACION=true` para ambiente de pruebas de AFIP.

  ---

  ## Base de datos

  - PostgreSQL 15, migraciones en `backend/migrations/` (numeradas 000001â†’000024).
  - `entrypoint.sh` ejecuta `migrate ... up` en cada inicio de contenedor (idempotente).
  - Redis: rate limiting + cachĂ© de sesiones + async job queue.
  - **ProducciĂ³n**: Redis con `appendfsync=always` (nunca perder ventas en crash).

  ---

  ## Variables de entorno (3 archivos .env requeridos)

  - `/backend/.env` â€” DB, Redis, JWT, URL del sidecar AFIP, SMTP
  - `/frontend/.env` â€” `VITE_API_BASE`, `VITE_API_URL`, `VITE_PRINTER_BAUD_RATE`
  - `/afip-sidecar/.env` â€” CUIT, rutas a certs, flag de homologaciĂ³n

  Los archivos `.env` son INTOCABLES en cĂ³digo y nunca se commitean.

  ---

  ## Restricciones inquebrantables

  1. **Nunca usar AutoMigrate de GORM**. Solo migraciones SQL explĂ­citas.
  2. **Nunca usar float64 para valores monetarios**. Siempre `shopspring/decimal`.
  3. **Nunca acceder a Dexie/IndexedDB fuera de `src/offline/`**.
  4. **Nunca leer/modificar archivos `.env` o `afip-sidecar/certs/`**.
  5. **Nunca hacer llamadas HTTP desde componentes React directamente**. Pasar por `src/api/` o `src/services/`.
  6. **Los tests del backend usan testcontainers (DB/Redis reales)**. No mockear la base de datos.
  7. **El middleware stack tiene orden fijo**. No reordenar sin anĂ¡lisis de impacto en seguridad.
  8. **Ventas son transacciones ACID**. NingĂºn cĂ³digo de venta puede quedar en estado parcial.

